<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BLOCK BLAST</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Animated background grid -->
  <div class="bg-grid"></div>

  <div id="app">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-block">B</span><span class="logo-block">L</span><span class="logo-block">O</span><span class="logo-block">C</span><span class="logo-block">K</span>
        <span class="logo-space"> </span>
        <span class="logo-blast">BLAST</span>
      </div>
    </header>

    <!-- Main layout -->
    <main class="game-layout">

      <!-- Left panel -->
      <aside class="panel panel-left">
        <div class="score-card">
          <div class="score-label">SCORE</div>
          <div class="score-value" id="scoreDisplay">0</div>
        </div>
        <div class="score-card high">
          <div class="score-label">BEST</div>
          <div class="score-value" id="highScoreDisplay">0</div>
        </div>
        <button class="btn-restart" id="restartBtn" title="Restart Game">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 .49-4.63"/>
          </svg>
          RESTART
        </button>
        <div class="combo-display" id="comboDisplay"></div>
      </aside>

      <!-- Game board -->
      <section class="board-wrapper">
        <div class="board-container">
          <div id="gameBoard" class="game-board"></div>
        </div>
      </section>

      <!-- Right panel -->
      <aside class="panel panel-right">
        <div class="next-label">NEXT</div>
        <div class="next-blocks" id="nextBlocks">
          <div class="next-slot" id="slot0"></div>
          <div class="next-slot" id="slot1"></div>
          <div class="next-slot" id="slot2"></div>
        </div>
        <div class="lines-card">
          <div class="score-label">LINES</div>
          <div class="score-value" id="linesDisplay">0</div>
        </div>
        <div class="level-card">
          <div class="score-label">LEVEL</div>
          <div class="score-value" id="levelDisplay">1</div>
        </div>
      </aside>

    </main>

  </div>

  <!-- Game Over Modal -->
  <div class="modal-overlay" id="gameOverModal">
    <div class="modal">
      <div class="modal-icon">💥</div>
      <h2 class="modal-title">GAME OVER</h2>
      <div class="modal-scores">
        <div class="modal-score-row">
          <span>SCORE</span>
          <span id="modalScore">0</span>
        </div>
        <div class="modal-score-row best">
          <span>BEST</span>
          <span id="modalBest">0</span>
        </div>
      </div>
      <button class="btn-play-again" id="playAgainBtn">PLAY AGAIN</button>
    </div>
  </div>

  <!-- Floating score pop -->
  <div class="score-pop" id="scorePop"></div>

  <script src="app.js"></script>
</body>
</html>
